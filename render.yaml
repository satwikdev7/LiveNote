services:
  - type: web
    name: livenote-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "8000"
      - key: WHISPER_MODEL_SIZE
        value: base
      - key: DIARIZATION_ENABLED
        value: "false"
      - key: DIARIZATION_MODE
        value: async_backfill
      - key: LLM_PROVIDER
        value: deepseek
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: LIVE_INTELLIGENCE_ENABLED
        value: "true"
      - key: STATE_MODE
        value: in_memory
      - key: CONCURRENT_MEETINGS
        value: "1"
      - key: SUPABASE_STORAGE_BUCKET
        value: meeting-exports
      # Set these in the Render dashboard — do not commit values to git
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: HUGGINGFACE_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
